# configs/farkle_mega_config.yaml
# Drives BOTH simulation and analysis.

io:
  results_dir_prefix: "results"     # prefix under data/ for per-N run folders
  analysis_subdir: "analysis"     # analysis outputs live under results_root/analysis

sim:
  # Table sizes to run (single-N works by giving a 1-item list)
  n_players_list: [2, 3, 4, 5, 6, 8, 10, 12]

  # Schedule & runtime controls
  seed: 102                        # active root RNG seed (results_root uses root suffix)
  seed_list: [102, 103]             # explicit seeds (len 1 single-seed, len 2 two-seed)
  n_jobs: 16                      # null = auto; otherwise an int
  mp_start_method: null            # start method: default|null|spawn|fork|forkserver
  expanded_metrics: true          # if true, also write {N}p_metrics.parquet with sums & sq_sums
  row_dir: "rows"                 # rows => per-N rows under {results}/{N}_players/rows/
                                  # If row_dir == null, row writing skipped
  desired_sec_per_chunk: 10
  ckpt_every_sec: 30
  progress_logging:
    frequent_interval_sec: 30
    info_phase_sec: 180
    ongoing_interval_sec: 600

  # Customize strategy grid
  # null (yaml) / None (py) loads default values for that variable
  score_thresholds: null          # None -> use [200, 250, ..., 1000]
  dice_thresholds: null           # None -> use [0, 1, 2, 3, 4]
  smart_five_opts: null           # None -> [True, False]
  smart_one_opts: null            # None -> [True, False]
  consider_score_opts: null       # None -> [True, False]
  consider_dice_opts: null        # None -> [True, False]
  auto_hot_dice_opts: null        # None -> [True, False]
  run_up_score_opts: null         # None -> [True, False]
  include_stop_at: false
  include_stop_at_heuristic: false

  # Optional per-N overrides (keys are strings)
  # per_n:
    # "12":

analysis:
  n_jobs: 16                      # parallel workers for analysis
  mp_start_method: null            # start method: default|null|spawn|fork|forkserver
  log_level: "INFO"               # logger level during analysis
  progress_logging:
    frequent_interval_sec: 30
    info_phase_sec: 180
    ongoing_interval_sec: 600

  # How to discover per-N results
  results_glob: "*_players"       # glob selecting per-N result folders under results_root

  # Optional custom output filenames / aliases
  outputs: {}                     # dict[str, Any]: e.g. override metrics/parquet names if desired

ingest:
  row_group_size: 64000           # parquet/arrow row group target
  parquet_codec: "snappy"         # parquet compression codec
  batch_rows: 100000              # rows processed per batch
  n_jobs: 8                       # concurrent ingest workers

combine:
  max_players: 12                 # maximum table size to combine

trueskill:
  beta: 4.166667                  # 25/6 (tighter prior than default_config)
  tau: 0.1
  draw_probability: 0.0

head2head:
  n_jobs: 0
  family_alpha: 0.02
  target_power: 0.80
  practical_delta: 0.03
  sensitivity_deltas: [0.03, 0.04]
  seat1_advantage_scenarios: [0.0, 0.03, 0.06]
  delta_equivalence: null
  candidate_cap: null
  candidate_cap_policy: "balanced-tail"
  total_game_cap: 100000000
  allow_single_root: true

rng:
  scheme_version: 1
  bit_generator: "PCG64DXSM"

screening:
  resolution_delta: 0.03
  interval_confidence: 0.95
  practical_delta_by_k: null
  delta_across_k: null
  bootstrap_replicates: 2000
  candidate_contribution_size: 75
  controls: []
  mandatory_diagnostics: []
  max_shuffles_per_root_k: null
  projected_games_per_second: null

batching:
  target_batches: 100
  min_shuffles_per_batch: 30

robustness:
  report_pareto: true
  report_maximin: true
  delta_seed_stability: 0.03
  joint_discrepancy_alpha: 0.05
  matched_count_fractions: [0.25, 0.50, 0.75, 1.0]

artifact_contract:
  artifact_contract_version: 1
  estimand_version: 1
  schema_version: 1

k_aggregation:
  method: "equal-k"
hgb:
  max_depth: 6
  n_estimators: 300
  heldout_folds: 5
  permutation_repeats: 10
  future_proposal_limit: 100
